# ============================================================================
# k8s Secrets — TEMPLATE (ADR-0006)
# ============================================================================
# This is an EXAMPLE with EMPTY values. Do NOT put real secrets here and do NOT
# commit a filled-in copy. The real manifest path `k8s/secrets.yaml` is
# gitignored.
#
# The previous checked-in `k8s/secrets.yaml` shipped base64 placeholder secrets
# (NEXTAUTH_SECRET, POSTGRES_PASSWORD=password, REDIS_PASSWORD=redispassword).
# Those were never real secrets — no git-history rewrite is needed — BUT because
# they are plausible-looking defaults, ANY cluster that actually applied that old
# manifest MUST rotate the postgres and redis passwords (and regenerate
# NEXTAUTH_SECRET) now. See ADR-0006 and ADR-0022's deployment checklist.
#
# ----------------------------------------------------------------------------
# RECOMMENDED: create the secret from an env file instead of committing YAML.
# Build an env file (never committed) with real values, e.g. secrets.env:
#
#   NEXTAUTH_SECRET=<openssl rand -hex 32>
#   JWT_SECRET=<openssl rand -hex 32>
#   ENCRYPTION_KEY=<openssl rand -hex 32>   # REQUIRED, 64 hex chars — see ADR-0006
#   DATABASE_URL=postgresql://sociallyhub:<db-password>@postgres-service:5432/sociallyhub
#   POSTGRES_PASSWORD=<db-password>
#   REDIS_PASSWORD=<redis-password>
#   REDIS_URL=redis://:<redis-password>@redis-service:6379
#
# Then create/replace the secrets:
#
#   kubectl create secret generic sociallyhub-secrets \
#     --namespace sociallyhub \
#     --from-env-file=secrets.env \
#     --dry-run=client -o yaml | kubectl apply -f -
#
#   kubectl create secret generic postgres-secret \
#     --namespace sociallyhub \
#     --from-literal=POSTGRES_PASSWORD='<db-password>' \
#     --dry-run=client -o yaml | kubectl apply -f -
#
#   kubectl create secret generic redis-secret \
#     --namespace sociallyhub \
#     --from-literal=REDIS_PASSWORD='<redis-password>' \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# BACK UP ENCRYPTION_KEY in a password manager at generation time. Losing it
# makes every encrypted column (social tokens, integration credentials)
# permanently unreadable.
# ----------------------------------------------------------------------------
#
# If you must apply YAML directly, fill the empty stringData values below (plain
# text; k8s base64-encodes stringData for you) and save as k8s/secrets.yaml.
apiVersion: v1
kind: Secret
metadata:
  name: sociallyhub-secrets
  namespace: sociallyhub
type: Opaque
stringData:
  NEXTAUTH_SECRET: ""
  JWT_SECRET: ""
  # REQUIRED (ADR-0006). 64 hex chars: `openssl rand -hex 32`. No fallback —
  # a missing/malformed value fails the app at startup.
  ENCRYPTION_KEY: ""
  DATABASE_URL: ""
  POSTGRES_PASSWORD: ""
  REDIS_PASSWORD: ""
  REDIS_URL: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: sociallyhub
type: Opaque
stringData:
  POSTGRES_PASSWORD: ""
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: sociallyhub
type: Opaque
stringData:
  REDIS_PASSWORD: ""
