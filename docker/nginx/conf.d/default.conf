# ============================================================================
# SociallyHub production virtual host (ADR-0022).
#
# !!! DEPLOY MUST SET THE REAL DOMAIN !!!
# ---------------------------------------------------------------------------
# v1 intentionally hardcodes the placeholder domain `sociallyhub.example.com`
# below (nginx cannot read env vars in plain config files). Before the FIRST
# deploy, replace every occurrence on the VM copy of this file, e.g.:
#
#   sed -i 's/sociallyhub\.example\.com/your.real.domain/g' \
#       docker/nginx/conf.d/default.conf
#
# (Or template it with envsubst from a *.conf.template if you prefer — the
# nginx:alpine image auto-runs envsubst on /etc/nginx/templates/*.template.
# We deliberately did NOT use that mechanism in v1 because $-variables in
# nginx configs collide with envsubst and silently corrupt the proxy headers
# unless every nginx variable is escaped; a one-shot sed is safer.)
#
# The domain must match ${SERVER_NAME} in .env.production and the certificate
# directory under /etc/letsencrypt/live/.
#
# TLS bootstrap (chicken-and-egg): this file references certificates that do
# not exist on a fresh VM, and nginx will not start without them. Runbook:
#   1. Temporarily comment out the entire 443 server block below.
#   2. `docker compose -f docker-compose.prod.yml up -d nginx`
#   3. `docker compose -f docker-compose.prod.yml run --rm certbot certonly \
#        --webroot -w /var/www/certbot -d your.real.domain \
#        --email you@example.com --agree-tos --no-eff-email`
#   4. Restore the 443 block, then `docker compose ... exec nginx nginx -s reload`.
# Renewals are automatic afterwards (certbot service loop + nginx reload loop
# in docker-compose.prod.yml).
# ============================================================================

# Map for the Upgrade/Connection header pair: pass "upgrade" only when the
# client actually requested a protocol upgrade, otherwise keep the connection
# header empty so keepalive works normally. (conf.d/*.conf is included inside
# the http{} context, so a top-level map here is valid.)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      '';
}

# ---------------------------------------------------------------------------
# :80 — ACME webroot + health for the container healthcheck, everything else
# 301s to HTTPS.
# ---------------------------------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name sociallyhub.example.com;

    # Let's Encrypt HTTP-01 challenge files (written by the certbot service
    # into the shared certbot_www volume).
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Docker embedded DNS + variable upstream: forces nginx to re-resolve the
    # `app` service name per request (30s cache) instead of pinning the IP it
    # saw at startup — otherwise every `docker compose up -d` that recreates
    # the app container leaves nginx 502ing at a stale IP until reload.
    resolver 127.0.0.11 valid=30s;
    set $app_upstream app:3099;

    # Plain-HTTP health endpoint so the nginx container healthcheck (and any
    # LAN prober) works without TLS or a resolvable public domain. Proxies to
    # the app's real /api/health (reports DB/Redis/worker/encryption state).
    location = /health {
        proxy_pass http://$app_upstream/api/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ---------------------------------------------------------------------------
# :443 — TLS termination, reverse proxy to the app container.
# ---------------------------------------------------------------------------
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name sociallyhub.example.com;

    # !!! Cert paths follow the domain — fixed by the same sed as above. !!!
    ssl_certificate     /etc/letsencrypt/live/sociallyhub.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sociallyhub.example.com/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    # Media uploads go through /api/media/upload (ADR-0007); keep headroom
    # above the app-side limits.
    client_max_body_size 25m;

    # Re-resolve the app service per request (see the :80 block comment).
    resolver 127.0.0.11 valid=30s;
    set $app_upstream app:3099;

    # Shared proxy defaults for all locations below.
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    # Websocket/SSE-friendly upgrade passthrough (ADR-0010).
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # Health (proxied to the app's real /api/health).
    location = /health {
        proxy_pass http://$app_upstream/api/health;
        access_log off;
    }

    # SSE notification stream (ADR-0010): buffering/caching MUST be off or
    # nginx holds events until the buffer fills and the stream appears dead.
    # Long read timeout keeps idle streams open between heartbeats.
    location = /api/notifications/stream {
        proxy_pass http://$app_upstream;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 24h;
        chunked_transfer_encoding off;
    }

    # Everything else → Next.js standalone server.
    location / {
        proxy_pass http://$app_upstream;
        proxy_read_timeout 60s;
    }
}
