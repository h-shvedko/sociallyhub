version: '3.8'

services:
  # Application
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
      args:
        - NODE_ENV=production
    image: sociallyhub:latest
    container_name: sociallyhub-app
    restart: unless-stopped
    ports:
      - "3099:3099"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://sociallyhub:${POSTGRES_PASSWORD}@postgres:5432/sociallyhub
      - REDIS_URL=redis://redis:6379
      - NEXTAUTH_URL=${NEXTAUTH_URL}
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Backup artifacts dir (ADR-0016) — shared named volume with the worker so
      # the web tier can serve/download a backup file the worker wrote.
      - BACKUP_DIR=/app/backups
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sociallyhub-network
    volumes:
      - uploads:/app/uploads
      - logs:/app/logs
      # Backup artifacts (ADR-0016) — shared with the worker service.
      - backups:/app/backups
    labels:
      - "com.sociallyhub.service=app"
      - "com.sociallyhub.version=1.0.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3099/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Background job worker (ADR-0008) — dedicated container from the SAME image as
  # `app` (built once, run with a different command). The web tier only enqueues;
  # this process owns BullMQ workers, repeatable schedules, and graceful shutdown.
  worker:
    image: sociallyhub:latest
    container_name: sociallyhub-worker
    restart: unless-stopped
    command: ["node", "dist/worker.js"]
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://sociallyhub:${POSTGRES_PASSWORD}@postgres:5432/sociallyhub
      # Redis requires a password (see redis service --requirepass); the worker
      # must authenticate. buildRedisConnectionOptions() parses REDIS_URL first.
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      # ENCRYPTION_KEY (ADR-0006): REQUIRED — the worker decrypts SocialAccount
      # tokens at publish time. Provide a real 64-hex key via the env/secret.
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      # Local media storage (ADR-0007), shared with `app` via the uploads volume.
      - STORAGE_DRIVER=${STORAGE_DRIVER:-local}
      - STORAGE_LOCAL_ROOT=/app/uploads
      # Backup artifacts dir (ADR-0016) — the worker writes pg_dump/tar files here.
      # NOTE: the prod image is built from Dockerfile.prod, which must also install
      # the postgresql client tools (pg_dump/pg_restore) for real backups to run;
      # without them the worker records an honest spawn-error FAILED. See ADR-0016.
      - BACKUP_DIR=/app/backups
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sociallyhub-network
    volumes:
      - uploads:/app/uploads
      - logs:/app/logs
      # Backup artifacts (ADR-0016) — shared with the app service.
      - backups:/app/backups
    labels:
      - "com.sociallyhub.service=worker"
      - "com.sociallyhub.version=1.0.0"
    healthcheck:
      # Liveness = the worker's Redis heartbeat key exists (refreshed every ~20s,
      # EX 60). ioredis is present in the traced standalone node_modules.
      test: ["CMD-SHELL", "node -e \"const R=require('ioredis');const r=new R(process.env.REDIS_URL);r.get('worker:heartbeat').then(v=>{r.quit();process.exit(v?0:1)}).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: sociallyhub-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=sociallyhub
      - POSTGRES_USER=sociallyhub
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - PGDATA=/var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/pgdata
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - postgres_backups:/backups
    networks:
      - sociallyhub-network
    labels:
      - "com.sociallyhub.service=database"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sociallyhub"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    command: >
      postgres 
      -c log_statement=all
      -c log_min_duration_statement=1000
      -c log_checkpoints=on
      -c log_connections=on
      -c log_disconnections=on
      -c shared_preload_libraries=pg_stat_statements

  # Redis Cache and Job Queue
  redis:
    image: redis:7-alpine
    container_name: sociallyhub-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server 
      --appendonly yes 
      --maxmemory 256mb 
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - sociallyhub-network
    labels:
      - "com.sociallyhub.service=cache"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: sociallyhub-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - sociallyhub-network
    labels:
      - "com.sociallyhub.service=proxy"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Monitoring - Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: sociallyhub-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./docker/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - sociallyhub-network
    labels:
      - "com.sociallyhub.service=monitoring"

  # Monitoring - Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: sociallyhub-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./docker/monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - sociallyhub-network
    labels:
      - "com.sociallyhub.service=visualization"
    depends_on:
      - prometheus

  # Log Management - Loki
  loki:
    image: grafana/loki:2.9.0
    container_name: sociallyhub-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
      - ./docker/monitoring/loki.yml:/etc/loki/local-config.yaml:ro
    networks:
      - sociallyhub-network
    labels:
      - "com.sociallyhub.service=logs"

  # Log Collection - Promtail
  promtail:
    image: grafana/promtail:2.9.0
    container_name: sociallyhub-promtail
    restart: unless-stopped
    volumes:
      - logs:/var/log/sociallyhub:ro
      - ./docker/monitoring/promtail.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - sociallyhub-network
    labels:
      - "com.sociallyhub.service=log-collection"

# Networks
networks:
  sociallyhub-network:
    driver: bridge
    labels:
      - "com.sociallyhub.network=main"

# Volumes
volumes:
  postgres_data:
    driver: local
    labels:
      - "com.sociallyhub.volume=database"
  postgres_backups:
    driver: local
    labels:
      - "com.sociallyhub.volume=backups"
  redis_data:
    driver: local
    labels:
      - "com.sociallyhub.volume=cache"
  uploads:
    driver: local
    labels:
      - "com.sociallyhub.volume=uploads"
  # Backup artifacts (ADR-0016) — shared by app + worker; distinct from the
  # postgres_backups volume mounted into the database container.
  backups:
    driver: local
    labels:
      - "com.sociallyhub.volume=app-backups"
  logs:
    driver: local
    labels:
      - "com.sociallyhub.volume=logs"
  prometheus_data:
    driver: local
    labels:
      - "com.sociallyhub.volume=metrics"
  grafana_data:
    driver: local
    labels:
      - "com.sociallyhub.volume=dashboards"
  loki_data:
    driver: local
    labels:
      - "com.sociallyhub.volume=logs-storage"