# ============================================================================
# SociallyHub production topology (ADR-0022) — self-hosted Docker VM.
#
# Image: built and pushed by CI to GHCR; this file NEVER builds. Deploy by
# setting APP_IMAGE_TAG in .env (see .env.production.example) and running:
#
#   docker compose -f docker-compose.prod.yml pull
#   docker compose -f docker-compose.prod.yml up -d
#
# Startup order is honest and enforced:
#   postgres healthy → migrate (one-shot `prisma migrate deploy`, exits 0)
#   → app + worker start. A failed migration BLOCKS the deploy instead of
#   booting an app against a half-migrated schema.
#
# TLS bootstrap on a fresh VM (certs don't exist yet — nginx's 443 block
# references them): see the runbook comment at the top of
# docker/nginx/conf.d/default.conf. Also replace the placeholder domain
# `sociallyhub.example.com` in that file before first deploy.
#
# Monitoring (prometheus/grafana/loki/promtail) is OPT-IN via the
# "monitoring" profile:  docker compose ... --profile monitoring up -d
# ============================================================================

services:
  # --------------------------------------------------------------------------
  # Edge: TLS termination + reverse proxy.
  # --------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: sociallyhub-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      # Shared with certbot: ACME webroot + issued certificates.
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    # Reload every 6h so renewed certificates (written by the certbot service)
    # are picked up without manual intervention.
    command: >
      /bin/sh -c "while :; do sleep 6h; nginx -s reload; done & nginx -g 'daemon off;'"
    # NO depends_on app — deliberate. The vhost config resolves the app
    # hostname at request time (resolver 127.0.0.11 + variable upstream), so
    # nginx starts fine before/without the app (502 until it's healthy). This
    # keeps the TLS bootstrap flow working: `up -d nginx` must not drag in the
    # app image before it has even been pulled (docs/ops/deployment.md §5-6).
    networks:
      - sociallyhub-network
    healthcheck:
      # Plain-HTTP /health on :80 (exempt from the HTTPS redirect) proxies to
      # the app's real /api/health.
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # --------------------------------------------------------------------------
  # Let's Encrypt renewal loop (webroot mode; nginx serves the challenges).
  # First issuance is a manual `docker compose run --rm certbot certonly ...` —
  # see docker/nginx/conf.d/default.conf for the exact runbook.
  # --------------------------------------------------------------------------
  certbot:
    image: certbot/certbot
    container_name: sociallyhub-certbot
    restart: unless-stopped
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    # Dual-mode entrypoint:
    #   - `up -d` (no command)            → 12h `certbot renew` loop
    #     (webroot mode; nginx serves the challenges from certbot_www).
    #   - `run --rm certbot certonly ...` → forwards the args straight to the
    #     certbot binary, so the bootstrap commands in docs/ops/deployment.md
    #     §5 work unchanged (compose `run` keeps the service entrypoint and
    #     only replaces the command, which lands in "$@" here).
    entrypoint:
      - /bin/sh
      - -c
      - >-
        if [ "$$#" -gt 0 ]; then exec certbot "$$@"; fi;
        trap exit TERM;
        while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $$!; done
      - certbot-entry
    command: []
    networks:
      - sociallyhub-network

  # --------------------------------------------------------------------------
  # One-shot migration runner (ADR-0002 migration-first). Same image as the
  # app; overrides the entrypoint to invoke the Prisma CLI baked into the
  # image (node_modules/prisma — copied explicitly in Dockerfile.prod, since
  # the standalone output does not trace devDependencies and `npx` would try
  # to download the CLI at deploy time). Runs `prisma migrate deploy`, exits;
  # app and worker wait for it to complete successfully.
  # --------------------------------------------------------------------------
  migrate:
    image: ghcr.io/h-shvedko/sociallyhub:${APP_IMAGE_TAG:?set APP_IMAGE_TAG (e.g. the git SHA CI pushed) in .env}
    container_name: sociallyhub-migrate
    restart: "no"
    entrypoint: ["node", "/app/prisma-cli/node_modules/prisma/build/index.js"] # self-contained pinned CLI (Dockerfile.prod)
    command: ["migrate", "deploy"]
    environment:
      - DATABASE_URL=postgresql://sociallyhub:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/sociallyhub
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - sociallyhub-network

  # --------------------------------------------------------------------------
  # Web tier: Next.js standalone server. Enqueues jobs; never publishes.
  # No host port — nginx is the only public entry point.
  # --------------------------------------------------------------------------
  app:
    image: ghcr.io/h-shvedko/sociallyhub:${APP_IMAGE_TAG:?set APP_IMAGE_TAG (e.g. the git SHA CI pushed) in .env}
    container_name: sociallyhub-app
    restart: unless-stopped
    # ADR-0023: Promtail's docker_sd job (docker/monitoring/promtail.yml) only
    # discovers containers carrying this label, and maps its value to the Loki
    # `service` label. Required for the stdout JSON logs to reach Loki.
    labels:
      com.sociallyhub.service: "app"
    # Secrets and app config come from the VM-side .env file
    # (see .env.production.example for the documented contract).
    env_file:
      # required:false lets `docker compose config` validate on machines
      # without a .env (CI, dev checkouts). This is NOT a silent-skip hole:
      # every critical var still fails loudly — ${VAR:?} interpolation above/
      # below and the entrypoint's ENCRYPTION_KEY assertion.
      - path: .env
        required: false
    environment:
      # Compose-internal wiring overrides (single source of truth for the
      # in-network hostnames; POSTGRES_PASSWORD/REDIS_PASSWORD interpolate
      # from .env).
      - NODE_ENV=production
      - DATABASE_URL=postgresql://sociallyhub:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/sociallyhub
      - REDIS_URL=redis://:${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}@redis:6379
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      # Local media storage (ADR-0007) on the shared uploads volume.
      - STORAGE_DRIVER=${STORAGE_DRIVER:-local}
      - STORAGE_LOCAL_ROOT=/app/uploads
      # Backup artifacts dir (ADR-0016) — shared named volume with the worker
      # so the web tier can serve/download a backup file the worker wrote.
      - BACKUP_DIR=/app/backups
      # Stripe billing (ADR-0019) — explicit pass-through from .env (env_file
      # above already loads them; listed here so the billing env contract is
      # visible in one place). Empty default = billing routes answer
      # 503 stripe_not_configured honestly; there is NO mock fallback.
      # App-only: the worker has no billing jobs yet.
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET:-}
      - STRIPE_PRICE_PRO_MONTHLY=${STRIPE_PRICE_PRO_MONTHLY:-}
      - STRIPE_PRICE_BUSINESS_MONTHLY=${STRIPE_PRICE_BUSINESS_MONTHLY:-}
      # Observability (ADR-0023). METRICS_TOKEN empty = /api/metrics open on the
      # compose-internal network (never proxied by nginx). LOG_TO_STDOUT=true
      # makes winston log JSON to stdout only (no in-container log files) so
      # promtail/Loki can scrape the Docker json logs. SENTRY_DSN empty =
      # Sentry/GlitchTip fully DORMANT (guarded dynamic import, zero cost).
      # WORKER_EXPECTED=true tells /api/health to assert the worker heartbeat
      # (the worker service below is always present in this topology).
      - METRICS_TOKEN=${METRICS_TOKEN:-}
      - LOG_TO_STDOUT=${LOG_TO_STDOUT:-true}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_TRACES_SAMPLE_RATE=${SENTRY_TRACES_SAMPLE_RATE:-0}
      - WORKER_EXPECTED=${WORKER_EXPECTED:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - sociallyhub-network
    volumes:
      - uploads:/app/uploads
      - backups:/app/backups
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3099/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # --------------------------------------------------------------------------
  # Background job worker (ADR-0008) — SAME image, different command. Owns
  # BullMQ workers, repeatable schedules, graceful shutdown, and the ADR-0016
  # backup jobs (pg_dump is installed in the image).
  # --------------------------------------------------------------------------
  worker:
    image: ghcr.io/h-shvedko/sociallyhub:${APP_IMAGE_TAG:?set APP_IMAGE_TAG (e.g. the git SHA CI pushed) in .env}
    container_name: sociallyhub-worker
    restart: unless-stopped
    # ADR-0023: labeled so Promtail's docker_sd job ships the worker's stdout
    # JSON logs to Loki under service="worker" (see the app service above).
    labels:
      com.sociallyhub.service: "worker"
    # Bypass the web entrypoint (its dep-waits are redundant here — compose
    # gates on healthchecks) and run the bundled worker directly.
    command: ["node", "dist/worker.js"]
    env_file:
      # required:false lets `docker compose config` validate on machines
      # without a .env (CI, dev checkouts). This is NOT a silent-skip hole:
      # every critical var still fails loudly — ${VAR:?} interpolation above/
      # below and the entrypoint's ENCRYPTION_KEY assertion.
      - path: .env
        required: false
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://sociallyhub:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/sociallyhub
      - REDIS_URL=redis://:${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}@redis:6379
      - DATABASE_HOST=postgres
      - DATABASE_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - STORAGE_DRIVER=${STORAGE_DRIVER:-local}
      - STORAGE_LOCAL_ROOT=/app/uploads
      # Backup artifacts dir (ADR-0016) — the worker writes pg_dump/tar files
      # here; Dockerfile.prod installs postgresql-client so pg_dump is real.
      - BACKUP_DIR=/app/backups
      # Observability (ADR-0023). The worker runs its own prom-client registry
      # on :9464 (scraped by Prometheus as job "sociallyhub-worker"). Same
      # honesty knobs as the app: METRICS_TOKEN guards the worker's /metrics,
      # LOG_TO_STDOUT streams JSON logs to Docker for Loki, SENTRY_DSN empty
      # keeps error tracking dormant. WORKER_EXPECTED is app-only (not needed
      # here — the worker does not read its own heartbeat).
      - METRICS_TOKEN=${METRICS_TOKEN:-}
      - LOG_TO_STDOUT=${LOG_TO_STDOUT:-true}
      - SENTRY_DSN=${SENTRY_DSN:-}
      - SENTRY_TRACES_SAMPLE_RATE=${SENTRY_TRACES_SAMPLE_RATE:-0}
    # Metrics port is compose-internal ONLY (Prometheus scrapes it over the
    # network); it is deliberately NOT published to the host.
    expose:
      - "9464"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - sociallyhub-network
    volumes:
      - uploads:/app/uploads
      - backups:/app/backups
    healthcheck:
      # Liveness = the worker's Redis heartbeat key exists (refreshed every
      # ~20s, EX 60). ioredis is present in the traced standalone node_modules.
      test: ["CMD-SHELL", "node -e \"const R=require('ioredis');const r=new R(process.env.REDIS_URL);r.get('worker:heartbeat').then(v=>{r.quit();process.exit(v?0:1)}).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # --------------------------------------------------------------------------
  # PostgreSQL — compose-network internal ONLY (no host port). Reach it via
  # `docker compose exec postgres psql -U sociallyhub` on the VM.
  # --------------------------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: sociallyhub-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=sociallyhub
      - POSTGRES_USER=sociallyhub
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data/pgdata
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - sociallyhub-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sociallyhub"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # --------------------------------------------------------------------------
  # Redis — compose-network internal ONLY (no host port), password-protected.
  # maxmemory-policy MUST be noeviction: BullMQ job state lives here and an
  # eviction policy that drops keys silently loses jobs (BullMQ requirement).
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: sociallyhub-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 256mb
      --maxmemory-policy noeviction
      --requirepass ${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}
    volumes:
      - redis_data:/data
    networks:
      - sociallyhub-network
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$$REDIS_PASSWORD\" ping | grep -q PONG"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ==========================================================================
  # OPTIONAL monitoring stack (ADR-0023) — enable with `--profile monitoring`.
  # All mounts reference files/dirs that ACTUALLY exist in the repo:
  #   docker/monitoring/{prometheus,loki,promtail}.yml
  #   docker/monitoring/rules/{recording,alerts}.yml         (prometheus rules)
  #   docker/monitoring/grafana/provisioning/{datasources,dashboards}/*.yml
  #   docker/monitoring/grafana/dashboards/*.json            (starter dashboard)
  # Grafana is now provisioned from disk (datasources + dashboards) on startup
  # instead of click-ops. Alerting is Grafana unified alerting on the
  # Prometheus datasource — there is NO Alertmanager container.
  # ==========================================================================
  prometheus:
    image: prom/prometheus:latest
    container_name: sociallyhub-prometheus
    restart: unless-stopped
    profiles: ["monitoring"]
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    volumes:
      - ./docker/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      # Recording + alert rules referenced by prometheus.yml's rule_files.
      - ./docker/monitoring/rules:/etc/prometheus/rules:ro
      - prometheus_data:/prometheus
    networks:
      - sociallyhub-network

  grafana:
    image: grafana/grafana:latest
    container_name: sociallyhub-grafana
    restart: unless-stopped
    profiles: ["monitoring"]
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      # Provisioning: Prometheus + Loki datasources and the dashboard provider
      # (these dirs now exist in the repo, ADR-0023 Track D).
      - ./docker/monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      # Dashboard JSON loaded by the file provider above.
      - ./docker/monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - sociallyhub-network
    depends_on:
      - prometheus

  loki:
    image: grafana/loki:2.9.0
    container_name: sociallyhub-loki
    restart: unless-stopped
    profiles: ["monitoring"]
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki_data:/loki
      - ./docker/monitoring/loki.yml:/etc/loki/local-config.yaml:ro
    networks:
      - sociallyhub-network

  promtail:
    image: grafana/promtail:2.9.0
    container_name: sociallyhub-promtail
    restart: unless-stopped
    profiles: ["monitoring"]
    volumes:
      - ./docker/monitoring/promtail.yml:/etc/promtail/config.yml:ro
      # App/worker log to stdout/stderr; promtail's docker_sd job scrapes the
      # Docker json logs via these mounts. (promtail.yml's file-based
      # /var/log/sociallyhub and /var/log/nginx jobs simply match no files —
      # the old shared `logs` volume was removed with the ADR-0022 rewrite.)
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - sociallyhub-network

  # ==========================================================================
  # OPTIONAL error tracking — GlitchTip (Sentry-protocol, self-hosted).
  # ADR-0023 Phase 4, item 10. DORMANT and DELIBERATELY behind its OWN
  # `glitchtip` profile (NOT `monitoring`) so that `--profile monitoring up`
  # stays 100% clean: GlitchTip needs manual first-time setup and would
  # otherwise sit as a crash-looping/exited container. It reuses the existing
  # Postgres (a DEDICATED `glitchtip` database) and Redis (DB index 1, separate
  # from BullMQ's DB 0). It does NOTHING for the app until SENTRY_DSN (a project
  # DSN created inside GlitchTip) is set on the app/worker services.
  #
  # FIRST-TIME SETUP (once, on the VM), then `--profile glitchtip up -d`:
  #   1. Set GLITCHTIP_SECRET_KEY in .env  (openssl rand -hex 32).
  #   2. Create the database:
  #        docker compose -f docker-compose.prod.yml exec postgres \
  #          psql -U sociallyhub -c "CREATE DATABASE glitchtip;"
  #   3. Run migrations + create the first superuser:
  #        docker compose -f docker-compose.prod.yml --profile glitchtip \
  #          run --rm glitchtip ./bin/run-migrate.sh
  #        docker compose -f docker-compose.prod.yml --profile glitchtip \
  #          run --rm glitchtip ./manage.py createsuperuser
  #   4. `--profile glitchtip up -d`, log into the UI (:8080), create an
  #      organization + project, copy its DSN into SENTRY_DSN in .env, then
  #      recreate the app/worker so @sentry/nextjs starts reporting.
  # Until all of the above is done this stack is a no-op.
  # ==========================================================================
  glitchtip:
    image: glitchtip/glitchtip:latest
    container_name: sociallyhub-glitchtip
    restart: unless-stopped
    profiles: ["glitchtip"]
    ports:
      - "8080:8000"
    environment:
      # Dedicated DB on the SHARED postgres (must be created first — see above).
      - DATABASE_URL=postgresql://sociallyhub:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/glitchtip
      # Redis DB 1 — kept OFF BullMQ's DB 0 (noeviction job store).
      - REDIS_URL=redis://:${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}@redis:6379/1
      # REQUIRED before GlitchTip will boot: openssl rand -hex 32.
      - SECRET_KEY=${GLITCHTIP_SECRET_KEY:-}
      - PORT=8000
      - GLITCHTIP_DOMAIN=${GLITCHTIP_DOMAIN:-http://localhost:8080}
      - DEFAULT_FROM_EMAIL=${GLITCHTIP_FROM_EMAIL:-glitchtip@localhost}
      # Console email backend by default (no outbound SMTP wired for GlitchTip).
      - EMAIL_URL=${GLITCHTIP_EMAIL_URL:-consolemail://}
      - CELERY_WORKER_AUTOSCALE=${GLITCHTIP_CELERY_AUTOSCALE:-1,3}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sociallyhub-network

  # GlitchTip background worker (celery + beat) — same image, trivial to add.
  glitchtip-worker:
    image: glitchtip/glitchtip:latest
    container_name: sociallyhub-glitchtip-worker
    restart: unless-stopped
    profiles: ["glitchtip"]
    command: ["./bin/run-celery-with-beat.sh"]
    environment:
      - DATABASE_URL=postgresql://sociallyhub:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}@postgres:5432/glitchtip
      - REDIS_URL=redis://:${REDIS_PASSWORD:?set REDIS_PASSWORD in .env}@redis:6379/1
      - SECRET_KEY=${GLITCHTIP_SECRET_KEY:-}
      - GLITCHTIP_DOMAIN=${GLITCHTIP_DOMAIN:-http://localhost:8080}
      - DEFAULT_FROM_EMAIL=${GLITCHTIP_FROM_EMAIL:-glitchtip@localhost}
      - EMAIL_URL=${GLITCHTIP_EMAIL_URL:-consolemail://}
      - CELERY_WORKER_AUTOSCALE=${GLITCHTIP_CELERY_AUTOSCALE:-1,3}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      glitchtip:
        condition: service_started
    networks:
      - sociallyhub-network

# Networks
networks:
  sociallyhub-network:
    driver: bridge

# Volumes
volumes:
  postgres_data:
  redis_data:
  uploads:
  # Backup artifacts (ADR-0016) — shared by app + worker.
  backups:
  # Let's Encrypt state: issued certs/account (conf) + ACME webroot (www).
  certbot_conf:
  certbot_www:
  prometheus_data:
  grafana_data:
  loki_data:
