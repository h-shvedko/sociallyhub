# =============================================================================
# Deploy — continuous deployment to the self-hosted VM (ADR-0022, Track D)
# =============================================================================
#
# WHAT THIS DOES
#   After the "Continuous Integration" workflow succeeds on main (which builds
#   and pushes ghcr.io/h-shvedko/sociallyhub:sha-<short-sha>), this workflow
#   SSHes into the production VM and performs a tag-swap deploy:
#     1. records the currently-running APP_IMAGE_TAG in .env.previous
#     2. writes the new tag into /opt/sociallyhub/.env
#     3. docker compose pull app worker
#     4. docker compose run --rm migrate        (forward-only, ADR-0002)
#     5. docker compose up -d app worker
#     6. health gate: /api/health must report "status":"healthy"
#        (HTTP 200 alone is NOT enough — the endpoint returns 200 even when
#        "degraded", e.g. worker down, so the body is asserted explicitly)
#     7. on health-gate failure: restores the previous tag from .env.previous,
#        re-ups app+worker (auto-rollback of the app layer; DB migrations are
#        forward-only and are NOT reverted), and fails the run.
#
# MANUAL DEPLOYS / ROLLBACKS
#   Run this workflow via workflow_dispatch and set `image_tag` to any tag that
#   exists in GHCR (e.g. sha-1a2b3c4). Leaving it empty deploys the current
#   main HEAD. Rolling back = dispatching with the previous tag.
#
# REQUIRED GITHUB CONFIGURATION (this workflow FAILS LOUDLY until it exists)
#   Secrets (repo or `production` environment scope):
#     DEPLOY_HOST     VM hostname or IP
#     DEPLOY_USER     SSH user on the VM (member of the docker group)
#     DEPLOY_SSH_KEY  private key (OpenSSH format) whose public half is in
#                     ~DEPLOY_USER/.ssh/authorized_keys on the VM
#   Environment:
#     A `production` environment (Settings → Environments). Add required
#     reviewers there if you want every deploy to need manual approval.
#
# REQUIRED VM STATE (see docs/ops/deployment.md — the provisioning runbook)
#   - /opt/sociallyhub contains docker-compose.prod.yml, docker/nginx/, and a
#     populated .env (APP_IMAGE_TAG, SERVER_NAME, POSTGRES_PASSWORD, ...).
#   - GHCR pull auth: the image is private by default, so run ONCE on the VM
#       docker login ghcr.io -u h-shvedko
#     with a read-only personal access token (scope: read:packages). The
#     credential persists in ~/.docker/config.json. (Alternatively make the
#     GHCR package public and skip the login.)
#
# NOTE: until a VM is provisioned per the runbook and the three DEPLOY_*
# secrets are set, this workflow does nothing useful — it fails fast at the
# "Verify deploy target is configured" step with an actionable message. That
# is deliberate (no silent skips).
# =============================================================================

name: Deploy

on:
  workflow_run:
    workflows: ["Continuous Integration"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: >-
          GHCR image tag to deploy (e.g. sha-1a2b3c4). Leave empty to deploy
          the current main HEAD. Use a previous tag to roll back.
        required: false
        type: string

permissions:
  contents: read

# Never run two deploys against the VM at once; queue instead of cancelling so
# a rollback dispatch is not killed by a queued CI-triggered deploy.
concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to production VM
    runs-on: ubuntu-latest
    environment: production
    # workflow_run fires on failure too — only deploy green main builds.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')

    steps:
      - name: Compute image tag
        id: tag
        env:
          INPUT_TAG: ${{ inputs.image_tag }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha || github.sha }}
        run: |
          set -euo pipefail
          if [ -n "${INPUT_TAG}" ]; then
            TAG="${INPUT_TAG}"
          else
            TAG="sha-$(printf '%s' "${HEAD_SHA}" | cut -c1-7)"
          fi
          # Guard: the tag is interpolated into a remote sed command — restrict
          # it to safe docker-tag characters.
          if ! printf '%s' "${TAG}" | grep -Eq '^[A-Za-z0-9][A-Za-z0-9._-]{0,127}$'; then
            echo "::error::Invalid image tag: ${TAG}"
            exit 1
          fi
          echo "tag=${TAG}" >> "${GITHUB_OUTPUT}"
          echo "Deploying ghcr.io/h-shvedko/sociallyhub:${TAG}"

      - name: Verify deploy target is configured
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          set -euo pipefail
          missing=0
          for name in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY; do
            eval "value=\${$name-}"
            if [ -z "${value}" ]; then
              echo "::error::Secret ${name} is not set."
              missing=1
            fi
          done
          if [ "${missing}" -ne 0 ]; then
            echo "No production VM is configured yet. Provision one per" \
                 "docs/ops/deployment.md, then add DEPLOY_HOST /" \
                 "DEPLOY_USER / DEPLOY_SSH_KEY secrets."
            exit 1
          fi

      - name: Deploy over SSH (pull → migrate → swap → health gate)
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail

          # Private key never touches the workflow log; file removed by the
          # ephemeral runner regardless.
          KEY_FILE="${RUNNER_TEMP}/deploy_key"
          printf '%s\n' "${DEPLOY_SSH_KEY}" > "${KEY_FILE}"
          chmod 600 "${KEY_FILE}"

          # accept-new: trust-on-first-use for the VM host key (no known_hosts
          # secret to manage); subsequent connections verify the pinned key.
          ssh -i "${KEY_FILE}" \
              -o StrictHostKeyChecking=accept-new \
              -o ConnectTimeout=15 \
              "${DEPLOY_USER}@${DEPLOY_HOST}" \
              IMAGE_TAG="${IMAGE_TAG}" bash -s <<'REMOTE_SCRIPT'
          set -euo pipefail
          cd /opt/sociallyhub
          COMPOSE="docker compose -f docker-compose.prod.yml"

          echo "==> Deploying image tag: ${IMAGE_TAG}"

          # --- 1. Remember the running tag so we can roll back -------------
          PREV_TAG="$(grep -E '^APP_IMAGE_TAG=' .env | head -n1 | cut -d= -f2- || true)"
          if [ -n "${PREV_TAG}" ]; then
            printf 'APP_IMAGE_TAG=%s\n' "${PREV_TAG}" > .env.previous
            echo "==> Saved previous tag to .env.previous: ${PREV_TAG}"
          else
            echo "==> No existing APP_IMAGE_TAG in .env (first deploy?) — no rollback point"
          fi

          # --- 2. Point compose at the new tag -----------------------------
          if grep -qE '^APP_IMAGE_TAG=' .env; then
            sed -i "s|^APP_IMAGE_TAG=.*|APP_IMAGE_TAG=${IMAGE_TAG}|" .env
          else
            printf 'APP_IMAGE_TAG=%s\n' "${IMAGE_TAG}" >> .env
          fi

          # --- 3. Pull, migrate (BEFORE new code starts), swap containers --
          ${COMPOSE} pull app worker
          ${COMPOSE} run --rm migrate
          ${COMPOSE} up -d app worker

          # --- 4. Health gate ----------------------------------------------
          # /api/health returns HTTP 200 for BOTH "healthy" and "degraded"
          # (e.g. worker down only degrades), so we assert the body says
          # "healthy" — that covers database, redis, filesystem, encryption
          # config AND the worker heartbeat. Up to 20 x 6s = ~2 min for the
          # app to boot and the worker heartbeat (refreshed every ~20s) to
          # appear.
          SERVER_NAME="$(grep -E '^SERVER_NAME=' .env | head -n1 | cut -d= -f2- || true)"
          if [ -n "${SERVER_NAME}" ]; then
            HEALTH_URL="https://${SERVER_NAME}/api/health"
            CURL_EXTRA=""
          else
            # Fallback: hit nginx on localhost; -k because the certificate CN
            # will not match "localhost".
            HEALTH_URL="https://localhost/api/health"
            CURL_EXTRA="-k"
          fi
          echo "==> Health gate: ${HEALTH_URL}"

          HEALTHY=0
          for attempt in $(seq 1 20); do
            BODY="$(curl -fsS ${CURL_EXTRA} --max-time 15 "${HEALTH_URL}" 2>/dev/null || true)"
            if printf '%s' "${BODY}" | grep -q '"status":"healthy"'; then
              HEALTHY=1
              echo "==> Health gate PASSED on attempt ${attempt}"
              break
            fi
            echo "    attempt ${attempt}/20: not healthy yet ($(printf '%s' "${BODY}" | grep -o '"status":"[a-z]*"' | head -n1 || echo 'no response'))"
            sleep 6
          done

          if [ "${HEALTHY}" -eq 1 ]; then
            echo "==> Deploy OK: ${IMAGE_TAG} is live and healthy"
            exit 0
          fi

          # --- 5. Auto-rollback --------------------------------------------
          echo "==> HEALTH GATE FAILED for ${IMAGE_TAG} — rolling back app layer"
          if [ -f .env.previous ]; then
            ROLLBACK_TAG="$(grep -E '^APP_IMAGE_TAG=' .env.previous | head -n1 | cut -d= -f2- || true)"
            if [ -n "${ROLLBACK_TAG}" ]; then
              sed -i "s|^APP_IMAGE_TAG=.*|APP_IMAGE_TAG=${ROLLBACK_TAG}|" .env
              ${COMPOSE} up -d app worker
              echo "==> Rolled back app+worker to ${ROLLBACK_TAG}."
              echo "==> NOTE: DB migrations are forward-only (ADR-0002 expand/contract) and were NOT reverted."
            else
              echo "==> .env.previous exists but has no APP_IMAGE_TAG — manual intervention required"
            fi
          else
            echo "==> No .env.previous — cannot auto-rollback; manual intervention required"
          fi
          exit 1
          REMOTE_SCRIPT
