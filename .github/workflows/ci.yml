name: Continuous Integration

# ============================================================================
# ADR-0022 Track B: the HONEST pipeline.
#
# Every job below is either a real, passable, meaningful gate (BLOCKING) or is
# loudly labelled advisory with the verified reason and the ADR that owns
# making it green. No phantom scripts, no gates that can never pass, no steps
# that silently skip.
#
# Verified baselines (2026-07-06) behind each blocking/advisory decision:
#   - `next build`         GREEN (ADR-0024)                         -> build BLOCKS
#   - `npm run build:worker` produces dist/worker.js                -> build BLOCKS
#   - `npm run db:check`   GREEN (ADR-0002 migration-first gate)    -> schema BLOCKS
#   - `npx tsc --noEmit`   1,641 pre-existing errors (deferred
#     subsystems; ADR-0002 fallout inventory)                       -> typecheck ADVISORY
#   - `npm run lint`       ~1,368-error pre-existing baseline       -> lint ADVISORY
#   - Jest (re-verified 2026-07-07, ADR-0021 Ratchet): config FIXED;
#     11/14 suites pass, 150/150 tests pass, ratcheted
#     coverageThreshold green. 3 Components suites still fail to
#     RUN: @testing-library/dom is absent from package.json AND the
#     lockfile (RTL v16 peer dep — `npm ci` won't install it), and
#     2 suites test components deleted from src                     -> test ADVISORY
#   - `npm audit --audit-level moderate`: 43 vulns (2 critical)
#     in the current tree                                           -> security ADVISORY
#   - e2e specs assert unverified selectors/data-testids against
#     the real UI, and docker-compose.ci.yml lands with Track C     -> e2e ADVISORY
#
# ADR-0021 owns ratcheting the advisory jobs into blocking gates.
#
# Removed from the previous pipeline (theater or contradicted owner decisions):
#   - deploy-preview (Vercel) — owner decision is self-hosted Docker (ADR-0022)
#   - performance job — installed Playwright browsers, then ran Jest
#   - visual-regression job — depended on the deleted .next artifact hand-off
#     and the broken webServer flow (no step ever started the app)
#   - Snyk step — requires a SNYK_TOKEN secret that is not provisioned
#   - Slack notify job — requires SLACK_WEBHOOK (not provisioned), referenced
#     deleted jobs
#   - the inline 70% coverage gate — unattainable with ~7 test files and a
#     broken Jest config; ADR-0021 owns coverage ratchets
#   - codecov fail_ci_if_error — same reason
#   - upload/download-artifact@v3 — disabled by GitHub; the docker job now
#     rebuilds hermetically instead of shipping .next between jobs
# ============================================================================

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

# Cancel superseded runs of the same ref (e.g. force-pushes to a PR branch).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '20'
  NEXTAUTH_URL: http://localhost:3099
  NEXTAUTH_SECRET: test-secret-for-ci
  DATABASE_URL: postgresql://sociallyhub:password@localhost:5432/sociallyhub_test
  REDIS_URL: redis://localhost:6379/1
  # ADR-0006: fail-closed crypto requires ENCRYPTION_KEY in every mode, including
  # CI. Throwaway fixed 64-hex test key (never used for real data); shared across
  # jobs so tests/build don't break on missing-key errors.
  ENCRYPTION_KEY: b29945a36f9850725969747a03f57cb7bb83d7655844f8c12d853e16e5a132c2

jobs:
  # --------------------------------------------------------------------------
  # ADVISORY: ESLint sits on a ~1,368-error pre-existing baseline, so a
  # blocking lint gate would be a gate that can never go green. It runs (so
  # the baseline is visible on every PR) but does not block. ADR-0021 owns
  # the ratchet to blocking.
  # --------------------------------------------------------------------------
  lint:
    name: Lint (advisory)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: ESLint (advisory — pre-existing ~1,368-error baseline, see ADR-0021)
        continue-on-error: true
        run: npm run lint

      # ADR-0005: publish the API route-auth coverage baseline on every build.
      # WARN mode — the script always exits 0; continue-on-error is belt-and-
      # suspenders so a scanner error can never block the build. Flips to a
      # hard gate in ADR-0005 Phase 4 (remove continue-on-error then).
      - name: Route auth coverage (ADR-0005, warn mode)
        continue-on-error: true
        run: npx tsx scripts/check-route-auth.ts

  # --------------------------------------------------------------------------
  # ADVISORY: `npx tsc --noEmit` reports 1,641 pre-existing errors (verified
  # 2026-07-06), concentrated in the deferred subsystems catalogued in
  # ADR/ADR-0002-fallout-inventory.md. A blocking typecheck gate is therefore
  # unattainable today. It runs so the error count is visible and regressions
  # are reviewable; ADR-0021 owns the ratchet to blocking.
  # NOTE: tsc passing would NOT be a substitute for the build gate anyway —
  # see the motivating bug on the build job below.
  # --------------------------------------------------------------------------
  typecheck:
    name: TypeScript (advisory)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: tsc --noEmit (advisory — 1,641 pre-existing errors in deferred subsystems, see ADR-0021)
        continue-on-error: true
        run: npm run typecheck

  # --------------------------------------------------------------------------
  # BLOCKING: schema gate (ADR-0002, migration-first). The schema must
  # validate, must match the committed migration history (drift check replays
  # prisma/migrations into a disposable shadow DB), migrations must deploy
  # onto a clean postgres, and the seed must produce real rows. All of this
  # is verified green today. `prisma db push` is banned (ADR-0002).
  # --------------------------------------------------------------------------
  schema:
    name: Schema & Migrations (gate)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: sociallyhub_test
          POSTGRES_USER: sociallyhub
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Schema Gate (ADR-0002) - fail fast: before anything else runs, the
      # schema must validate and must match the committed migration history
      # (the drift check replays prisma/migrations into a disposable shadow
      # database created on the job's postgres service).
      - name: Validate schema and check migration drift
        run: |
          PGPASSWORD=password psql -h localhost -p 5432 -U sociallyhub -d sociallyhub_test -c 'CREATE DATABASE sociallyhub_shadow'
          npm run db:check
        env:
          SHADOW_DATABASE_URL: postgresql://sociallyhub:password@localhost:5432/sociallyhub_shadow

      - name: Deploy migrations and generate client
        run: |
          npx prisma migrate deploy
          npx prisma generate

      # Seed smoke test: the seed must run to completion against freshly
      # deployed migrations and produce a real dataset. The row-count check is
      # a genuine assertion (it catches seed/schema divergence), not theater.
      # (The old "performance test" probe was removed: its 5s threshold only
      # ever warned, so it gated nothing.)
      - name: Seed smoke test (real row counts)
        run: |
          npm run db:seed
          node -e "
            const { PrismaClient } = require('@prisma/client');
            const prisma = new PrismaClient();

            async function validateData() {
              try {
                const userCount = await prisma.user.count();
                const workspaceCount = await prisma.workspace.count();
                const postCount = await prisma.post.count();
                const metricsCount = await prisma.analyticsMetric.count();

                console.log('Seed validation results:');
                console.log('  Users: ' + userCount);
                console.log('  Workspaces: ' + workspaceCount);
                console.log('  Posts: ' + postCount);
                console.log('  Analytics Metrics: ' + metricsCount);

                if (userCount < 10 || workspaceCount < 5 || postCount < 50) {
                  throw new Error('Insufficient seed data generated');
                }

                console.log('Seed validation passed');
              } catch (error) {
                console.error('Seed validation failed:', error.message);
                process.exit(1);
              } finally {
                await prisma.\$disconnect();
              }
            }

            validateData();
          "
        env:
          NODE_ENV: test

  # --------------------------------------------------------------------------
  # ADVISORY (updated 2026-07-07, ADR-0021 Ratchet stage): the config is FIXED
  # — the old "broken at config level" reason is no longer true. Verified:
  # 11/14 suites pass, 150/150 tests pass, and jest.config.js now enforces the
  # ratcheted coverageThreshold (measured baseline; thresholds only move up).
  # Still advisory because 3 Components suites fail to RUN:
  #   1. @testing-library/dom is missing from package.json AND package-lock
  #      (a peer dep of @testing-library/react v16) — `npm ci` will not
  #      install it, so button + post-creation-form suites cannot load RTL.
  #      Fix: add it as a devDependency (a dependency change, not a config
  #      change — out of Ratchet-stage scope).
  #   2. overview-cards.test.tsx and post-creation-form.test.tsx test
  #      components that no longer exist in src (stale tests; delete or
  #      rewrite against the real analytics-overview-cards component).
  # FLIPPED TO BLOCKING (2026-07-07, ADR-0021): @testing-library/dom is now a
  # devDependency, the 2 stale suites were deleted, and button.test.tsx asserts
  # the component's real Material classes — 12/12 suites / 158 tests green with
  # the ratcheted coverageThreshold enforced by jest.config.js.
  # --------------------------------------------------------------------------
  test:
    name: Jest (gate — ratcheted coverage)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: sociallyhub_test
          POSTGRES_USER: sociallyhub
          POSTGRES_PASSWORD: password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup test database
        run: |
          npx prisma migrate deploy
          npx prisma generate

      - name: Run Jest (blocking — coverage ratchet in jest.config.js)
        run: npm run test:ci

      # Coverage is uploaded for visibility. The threshold gate lives in
      # jest.config.js (ADR-0021 ratcheted coverageThreshold at the measured
      # baseline) and runs as part of the step above; it becomes a hard CI
      # gate when this job drops continue-on-error.
      - name: Upload coverage report (non-blocking)
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
          if-no-files-found: ignore

  # --------------------------------------------------------------------------
  # BLOCKING: THE GATE.
  #
  # Motivating bug (why this job exists): a missing npm package ('sonner')
  # shipped to main because `tsc --noEmit` PASSES on missing-module value
  # imports — TypeScript only type-checks, it does not resolve and bundle
  # runtime modules. Only `next build` actually resolves every import in the
  # app graph, so only `next build` catches that class of defect. The same
  # applies to the worker: `npm run build:worker` (esbuild) resolves the whole
  # worker graph into dist/worker.js — the exact artifact the worker container
  # runs (`node dist/worker.js`).
  #
  # `next build` is verified GREEN as of ADR-0024, so this gate is passable
  # today and every red run means a real regression.
  # --------------------------------------------------------------------------
  build:
    name: Build (gate)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js app (catches missing-module imports tsc misses)
        run: npm run build

      - name: Build worker bundle
        run: npm run build:worker

      - name: Assert worker artifact exists
        run: test -f dist/worker.js

      # No .next artifact upload: the docker-image job rebuilds hermetically
      # via Dockerfile.prod (and upload-artifact@v3 is disabled by GitHub).

  # --------------------------------------------------------------------------
  # BLOCKING: the production image must build from Dockerfile.prod on every
  # PR (push: false), and is pushed to GHCR only on push to main. GHA layer
  # cache keeps rebuilds (including the e2e job's load) warm.
  # --------------------------------------------------------------------------
  docker-image:
    name: Docker image (gate)
    runs-on: ubuntu-latest
    needs: [build]
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR (main pushes only)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (push only on main)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prod
          tags: ghcr.io/h-shvedko/sociallyhub:sha-${{ github.sha }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --------------------------------------------------------------------------
  # ADVISORY until ADR-0021: pragmatic v1 e2e smoke against the REAL production
  # image (docker-compose.ci.yml, owned by Track C — it consumes APP_IMAGE).
  #
  # Why advisory (job-level continue-on-error), verified 2026-07-06:
  #   1. The existing e2e specs assert selectors/data-testids and literal texts
  #      that were never verified against the real UI (e.g. `h1` containing
  #      'Sign In', '[data-testid="total-users-card"]') — the suite has never
  #      run green because no CI step ever started the app.
  #   2. docker-compose.ci.yml lands with Track C; until it merges this job
  #      cannot pass by definition.
  # The job is fully real end-to-end (image boot, /api/health wait, migrate +
  # seed, Playwright chromium against e2e/auth.spec.ts) so the moment Track C
  # lands and a smoke spec is verified, dropping continue-on-error flips it to
  # a blocking gate (ADR-0021).
  #
  # Contract for Track C / verify stage: docker-compose.ci.yml must expose the
  # app on localhost:3099 and postgres on localhost:5432 with credentials
  # matching this workflow's DATABASE_URL
  # (postgresql://sociallyhub:password@localhost:5432/sociallyhub_test).
  # --------------------------------------------------------------------------
  e2e:
    name: E2E smoke (gate — chromium auth spec vs the prod image)
    runs-on: ubuntu-latest
    needs: [docker-image]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # The docker-image job runs on a different runner, and on PRs the image
      # is not pushed anywhere — so rebuild here with load: true. The GHA layer
      # cache written by the docker-image job makes this a cache hit, not a
      # second cold build.
      - name: Load production image into local docker (from GHA cache)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.prod
          tags: ghcr.io/h-shvedko/sociallyhub:sha-${{ github.sha }}
          push: false
          load: true
          cache-from: type=gha

      - name: Start CI stack (Track C compose)
        run: docker compose -f docker-compose.ci.yml up -d
        env:
          APP_IMAGE: ghcr.io/h-shvedko/sociallyhub:sha-${{ github.sha }}

      - name: Wait for compose postgres to accept connections
        run: |
          for i in $(seq 1 30); do
            if pg_isready -h localhost -p 5432 -U sociallyhub > /dev/null 2>&1; then
              echo "Postgres is ready"
              exit 0
            fi
            echo "Waiting for postgres... ($i/30)"
            sleep 2
          done
          echo "Postgres never became ready"
          exit 1

      - name: Apply migrations and seed (against the compose postgres)
        run: |
          npx prisma migrate deploy
          npx prisma generate
          npm run db:seed
          # Deterministic e2e fixtures (ADR-0021): the rewritten specs +
          # global-setup sign in as the e2e fixture user, not demo data.
          npx tsx prisma/seed-e2e.ts
        env:
          NODE_ENV: test

      - name: Wait for /api/health (real readiness — reports Redis/worker state)
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:3099/api/health > /dev/null 2>&1; then
              echo "App is healthy"
              exit 0
            fi
            echo "Waiting for app... ($i/60)"
            sleep 5
          done
          echo "App never became healthy; dumping compose logs:"
          docker compose -f docker-compose.ci.yml logs --tail 200
          exit 1
        env:
          APP_IMAGE: ghcr.io/h-shvedko/sociallyhub:sha-${{ github.sha }}

      - name: Install Playwright (chromium only)
        run: npx playwright install --with-deps chromium

      # Smoke subset only: the auth spec on chromium. The full multi-browser /
      # visual / performance matrix is ADR-0021 scope.
      - name: Run Playwright smoke (auth spec, chromium)
        run: npx playwright test e2e/auth.spec.ts --project=chromium
        env:
          CI: 'true'
          PLAYWRIGHT_BASE_URL: http://localhost:3099

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
          if-no-files-found: ignore

      - name: Tear down CI stack
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v
        env:
          APP_IMAGE: ghcr.io/h-shvedko/sociallyhub:sha-${{ github.sha }}

  # --------------------------------------------------------------------------
  # ADVISORY: `npm audit --audit-level moderate` currently reports 43
  # vulnerabilities (4 low, 28 moderate, 9 high, 2 critical) in the existing
  # dependency tree (verified 2026-07-06), so a blocking audit gate would be
  # unattainable. It runs for visibility; ADR-0021 owns the remediation +
  # ratchet. The old Snyk step was removed (SNYK_TOKEN is not provisioned).
  # --------------------------------------------------------------------------
  security:
    name: Security audit (advisory)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: npm audit (advisory — 43 known vulns incl. 2 critical, see ADR-0021)
        continue-on-error: true
        run: npm audit --audit-level moderate
