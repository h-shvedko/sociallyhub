services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: sociallyhub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sociallyhub
      POSTGRES_PASSWORD: sociallyhub_dev_password
      POSTGRES_DB: sociallyhub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sociallyhub -d sociallyhub"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for caching and job queues
  redis:
    image: redis:7-alpine
    container_name: sociallyhub-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: sociallyhub-app
    restart: unless-stopped
    ports:
      - "3099:3000"
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://sociallyhub:sociallyhub_dev_password@postgres:5432/sociallyhub
      - REDIS_URL=redis://redis:6379
      - NEXTAUTH_SECRET=dev-secret-key-change-in-production
      - NEXTAUTH_URL=http://localhost:3099
      - JWT_SECRET=dev-jwt-secret-change-in-production
      # ENCRYPTION_KEY (ADR-0006): fixed DEV-ONLY key, like the postgres password
      # above. Shared by the host dev server, this container, and CI so they can
      # all decrypt each other's data. Generate a UNIQUE key for every real
      # environment with `openssl rand -hex 32` — never reuse this value.
      - ENCRYPTION_KEY=b29945a36f9850725969747a03f57cb7bb83d7655844f8c12d853e16e5a132c2
      # SMTP Configuration for Mailhog
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - SMTP_USER=
      - SMTP_PASSWORD=
      - SMTP_FROM=noreply@sociallyhub.dev
      - SMTP_SECURE=false
      # Enable file watching and hot reload
      - CHOKIDAR_USEPOLLING=true
      - CHOKIDAR_INTERVAL=1000
      - WATCHPACK_POLLING=true
      # Backup artifacts dir (ADR-0016) — shared named volume with the worker so
      # the web tier can serve/download a backup file the worker wrote.
      - BACKUP_DIR=/app/backups
    volumes:
      - ./src:/app/src
      - ./public:/app/public
      - ./prisma:/app/prisma
      - ./next.config.js:/app/next.config.js
      - ./tailwind.config.ts:/app/tailwind.config.ts
      - ./tsconfig.json:/app/tsconfig.json
      - ./components.json:/app/components.json
      - ./.env.local:/app/.env.local
      # package manifests bind-mounted so `docker compose exec app npm install`
      # sees the CURRENT dependency list — without these the container installs
      # from the stale image-baked package.json and new deps never land in the
      # shared node_modules volume (ADR-0024 gotcha, same class as the former
      # next.config.ts dangling mount).
      - ./package.json:/app/package.json
      - ./package-lock.json:/app/package-lock.json
      - next_cache:/app/.next
      # Backup artifacts (ADR-0016) — shared with the worker service.
      - backups:/app/backups
      # Use named volume for node_modules to prevent host conflicts
      - node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailhog:
        condition: service_healthy
    command: npm run dev:docker

  # Background job worker (ADR-0008) — dedicated process, SAME image as `app`.
  # This is the only thing that starts BullMQ workers; the web app only enqueues.
  # Runs the worker via tsx (dev) and shares the `node_modules` named volume with
  # `app`, so hot edits under ./src are picked up on restart.
  worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: sociallyhub-worker
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://sociallyhub:sociallyhub_dev_password@postgres:5432/sociallyhub
      - REDIS_URL=redis://redis:6379
      # ENCRYPTION_KEY (ADR-0006): the worker decrypts SocialAccount tokens at
      # publish time — same DEV-ONLY key as `app` so both decrypt the same rows.
      - ENCRYPTION_KEY=b29945a36f9850725969747a03f57cb7bb83d7655844f8c12d853e16e5a132c2
      # SMTP for notification-dispatch jobs (Mailhog)
      - SMTP_HOST=mailhog
      - SMTP_PORT=1025
      - SMTP_USER=
      - SMTP_PASSWORD=
      - SMTP_FROM=noreply@sociallyhub.dev
      - SMTP_SECURE=false
      # Local media storage (ADR-0007) for jobs that read attached media
      - STORAGE_DRIVER=local
      - STORAGE_LOCAL_ROOT=/app/uploads
      # Backup artifacts dir (ADR-0016) — the worker writes pg_dump/tar files here.
      - BACKUP_DIR=/app/backups
    volumes:
      - ./src:/app/src
      - ./prisma:/app/prisma
      - ./tsconfig.json:/app/tsconfig.json
      - ./.env.local:/app/.env.local
      # Current package manifests (see the app service comment — ADR-0024).
      - ./package.json:/app/package.json
      - ./package-lock.json:/app/package-lock.json
      # Backup artifacts (ADR-0016) — shared with the app service.
      - backups:/app/backups
      # Share node_modules with `app` (populated from the image on first mount).
      - node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: npm run worker
    healthcheck:
      # Liveness = the worker's Redis heartbeat key exists (refreshed every ~20s,
      # EX 60). node + ioredis are in the shared node_modules volume.
      test: ["CMD-SHELL", "node -e \"const R=require('ioredis');const r=new R(process.env.REDIS_URL);r.get('worker:heartbeat').then(v=>{r.quit();process.exit(v?0:1)}).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  # Mailhog for local email testing
  mailhog:
    image: mailhog/mailhog:latest
    container_name: sociallyhub-mailhog
    restart: unless-stopped
    ports:
      - "1025:1025"  # SMTP server
      - "8025:8025"  # Web UI
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8025/"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Prisma Studio (Database GUI)
  prisma-studio:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: sociallyhub-prisma-studio
    restart: unless-stopped
    ports:
      - "5555:5555"
    environment:
      - DATABASE_URL=postgresql://sociallyhub:sociallyhub_dev_password@postgres:5432/sociallyhub
    volumes:
      - ./prisma:/app/prisma
      - ./.env.local:/app/.env.local
      # Use named volume for node_modules to prevent host conflicts
      - node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    command: npx prisma studio --hostname 0.0.0.0
    profiles:
      - tools

volumes:
  postgres_data:
  redis_data:
  next_cache:
  node_modules:
  # Backup artifacts (ADR-0016) — shared by app + worker.
  backups: